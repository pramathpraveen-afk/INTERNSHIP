<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .card{
            display:flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            
        }
        .box{
            border: 7px red solid;
            padding: 15px;
            margin: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="box">
            <h2>Master 3D Design</h2>
            <img src="3d.png" alt="" width="200px" height="200px">
            <p>Earn Global Solidworks</p>
            <button>View More</button>
        </div>
        <div class="box">
            <h2>Embedded systems</h2>
            <img src="emb.jpeg" alt="" width="200px" height="200px">
            <p>Earn Global Solidworks</p>
            <button>View More</button>
        </div>
        <div class="box">
            <h2>VLSI</h2>
            <img src="vlsi.jpeg" alt="" width="200px" height="200px">
            <p>Earn Global Solidworks</p>
            <button>View More</button>
        </div>
        <div class="box">
            <h2>Software Engineering</h2>
            <img src="soft.jpeg" alt="" width="200px" height="200px">
            <p>Earn Global Solidworks</p>
            <button>View More</button>
        </div>
    </div>
</body>
</html>
